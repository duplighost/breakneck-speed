<link rel="icon" href="./assets/favicon.svg">
<style>
:root{
  --ink:#eef3ff; --dim:#9eb0cc; --bg:#05070b; --bad:#ff6b6b;
  --panel:rgba(13,18,28,.72); --line:rgba(255,255,255,.09);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; height:100%; overflow:hidden; background:var(--bg)}
body{font:600 15px/1.45 Inter,system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--ink);
  -webkit-user-select:none; user-select:none; touch-action:none; overscroll-behavior:none}
canvas#game{position:fixed; inset:0; display:block}
button{font:inherit; color:inherit; cursor:pointer; border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  border-radius:12px; padding:10px 16px; backdrop-filter:blur(10px)}
button:hover{border-color:rgba(255,255,255,.22)}
.panel{background:var(--panel); border:1px solid var(--line); border-radius:16px;
  backdrop-filter:blur(12px); box-shadow:0 18px 50px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05)}

#hud{position:fixed; top:10px; left:10px; right:10px; display:flex; justify-content:space-between;
  align-items:flex-start; gap:10px; pointer-events:none; z-index:5}
#hud .chip{pointer-events:auto; padding:8px 12px; display:flex; gap:12px; align-items:baseline; flex-wrap:wrap}
#zone{font-weight:900; letter-spacing:-.02em}
#roomNo,#comboChip{color:var(--dim); font-size:13px}
#hp{letter-spacing:2px; font-size:14px}
#hp.comboHeal{color:#7efab7; text-shadow:0 0 16px #7efab7,0 0 34px rgba(126,250,183,.55); animation:comboHealPop .72s ease-out}
#hp .hurt{color:var(--bad)}
#comboChip.comboHot{color:#ffd36e; text-shadow:0 0 12px #ffd36e}
#comboChip.comboHeal{color:#7efab7; text-shadow:0 0 16px #7efab7}
@keyframes comboHealPop{0%{transform:scale(1)}30%{transform:scale(1.28)}65%{transform:scale(.98)}100%{transform:scale(1)}}
#score{font-weight:900; font-variant-numeric:tabular-nums}
#pulseWrap{display:none; width:120px; height:9px; border-radius:99px; background:rgba(255,255,255,.08);
  overflow:hidden; align-self:center}
#pulseFill{display:block; height:100%; width:0%; background:linear-gradient(90deg,#7dfdff,#f3dcff);
  border-radius:99px; transition:width 120ms linear}
#pulseWrap.ready #pulseFill{
  background:linear-gradient(90deg,#7dfdff,#eaffff,#f3dcff,#7dfdff);
  background-size:220% 100%;
  animation:pulseSheen .9s linear infinite;
  box-shadow:0 0 14px #7dfdff, inset 0 0 6px rgba(255,255,255,.7);
}
@keyframes pulseSheen{from{background-position:220% 0}to{background-position:0 0}}
.miniBtn{pointer-events:auto; padding:6px 10px; font-size:12px; border-radius:10px; color:var(--dim)}
#buildChips{position:fixed; left:10px; bottom:10px; display:flex; gap:6px; flex-wrap:wrap; max-width:60vw;
  pointer-events:none; z-index:5}
#buildChips .graft{padding:4px 8px; font-size:12px; border-radius:9px; background:var(--panel);
  border:1px solid var(--line); color:var(--dim)}

#whisper{position:fixed; left:50%; bottom:56px; transform:translateX(-50%); max-width:min(560px,86vw);
  text-align:center; color:var(--dim); font-size:13.5px; opacity:0; transition:opacity .5s; z-index:6;
  text-shadow:0 2px 12px #000; pointer-events:none}
#whisper.show{opacity:1}

/* one-time nudge: fades in on entering portrait, auto-dismisses after a few seconds */
#rotateHint{opacity:0; visibility:hidden; transition:opacity .5s ease, visibility .5s;
  position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom,0px) + 88px);
  transform:translateX(-50%); z-index:7; pointer-events:none; text-align:center; max-width:88vw;
  background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:7px 13px;
  font-size:12.5px; color:var(--ink); box-shadow:0 8px 24px rgba(0,0,0,.5); backdrop-filter:blur(10px)}
#rotateHint.show{opacity:1; visibility:visible}
@media (pointer:coarse){ /* bigger HUD on phones — easier to read mid-fight */
  #zone,#hp,#score{font-size:17px}
  #roomNo,#comboChip{font-size:14px}
}

.modalHost{position:fixed; inset:0; display:none; align-items:center; justify-content:center;
  background:rgba(3,5,9,.55); z-index:20; padding:18px}
.modalHost.show{display:flex}
.modal{max-width:min(620px,94vw); max-height:92vh; overflow:auto; padding:26px 26px 22px; text-align:center}
.modal h1{margin:0 0 10px; font-size:clamp(30px,6vw,52px); letter-spacing:-.045em; font-weight:900}
.modal h2{margin:0 0 12px; font-size:clamp(22px,4.4vw,34px); letter-spacing:-.03em; font-weight:900}
.modal p{margin:0 0 18px; color:var(--dim)}
.buttonRow{display:flex; gap:10px; justify-content:center; flex-wrap:wrap}
.bigBtn{padding:13px 22px; font-weight:800; border-radius:13px; min-width:130px; min-height:48px}
.meta{margin-top:14px; font-size:12.5px; color:var(--dim)}

#draftCards{display:flex; gap:12px; justify-content:center; flex-wrap:wrap}
.draftCard{width:min(170px,28vw); min-height:150px; text-align:left; padding:13px; border-radius:14px;
  display:flex; flex-direction:column; gap:6px; transition:transform .12s ease}
.draftCard:hover{transform:translateY(-4px)}
.draftCard b{font-size:15px; letter-spacing:-.01em}
.draftCard .tag{font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em}
.draftCard p{margin:0; font-size:12.5px; color:var(--dim); flex:1}
.draftCard .stacks{font-size:11px; color:#ffd36e}

#overlayBody{text-align:left; margin-bottom:16px}
#overlayBody:empty{display:none}
.shrineCard{display:flex; gap:12px; align-items:center; width:100%; text-align:left;
  margin-bottom:8px; padding:11px 14px; min-height:48px}
.shrineCard.owned{opacity:.55}
.shrineCard b{min-width:128px}
.shrineCard p{margin:0; flex:1; font-size:12.5px; color:var(--dim)}
.shrineCard .cost{font-size:12px; color:#ffd36e; white-space:nowrap}
.codexGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; margin:10px 0}
.codexCard{padding:9px 11px; border:1px solid var(--line); border-radius:10px; font-size:12px}
.codexCard b{display:block; font-size:13px}
.codexCard p{margin:3px 0 0; color:var(--dim)}
.codexCard .kills{color:#ffd36e; font-size:11px}
.noticeList{font-size:12.5px; color:var(--dim); line-height:1.7; max-height:160px; overflow:auto}
.miniBtn{min-height:44px; min-width:44px}
.bigBtn{transition:transform .12s ease, box-shadow .2s ease}

/* ── Title screen: the poster art IS the title. It covers the screen in portrait and
   is centred (contain) over the live neon-city canvas in landscape, so one image reads
   right on phone, on desktop, and when you tilt the phone sideways. Buttons sit on a
   bottom gradient; the HUD hides so the art is clean. ── */
#titlePoster{
  position:fixed; inset:0; z-index:1; pointer-events:none; display:none;
  background:transparent center top / cover no-repeat;   /* transparent → live canvas fills the landscape letterbox / load gap */
  background-image:url(./assets/title-portrait.webp);
}
body.onTitle #titlePoster{display:block}
@media (orientation:landscape){ body.onTitle #titlePoster{background-size:contain; background-position:center} }
body.onTitle #hud, body.onTitle #buildChips, body.onTitle #whisper{display:none}
body.onTitle #overlay{align-items:flex-end;
  background:linear-gradient(to top,rgba(3,5,11,.94) 2%,rgba(3,5,11,.55) 22%,rgba(3,5,11,0) 48%)}
body.onTitle #overlay .modal{background:transparent; border:none; box-shadow:none; max-width:560px;
  padding:0 18px calc(20px + env(safe-area-inset-bottom,0px))}
body.onTitle #overlay h1, body.onTitle #overlay #overlayCopy{display:none} /* poster carries logo + tagline */
body.onTitle #overlay .meta{color:#d6e4f8; margin-top:11px; text-shadow:0 1px 6px #000}
.modalHost.titleScreen .bigBtn:first-child{
  min-width:210px; font-size:18px; padding:15px 28px; letter-spacing:.02em;
  border-color:rgba(125,253,255,.6);
  background:linear-gradient(180deg,rgba(125,253,255,.28),rgba(243,220,255,.12));
  box-shadow:0 0 26px rgba(125,253,255,.4), inset 0 1px 0 rgba(255,255,255,.2);
}
.modalHost.titleScreen .bigBtn:first-child:hover{
  border-color:rgba(234,255,255,.95); transform:translateY(-2px);
  box-shadow:0 0 40px rgba(125,253,255,.6), inset 0 1px 0 rgba(255,255,255,.28);
}
.modalHost.titleScreen .buttonRow{gap:12px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="titlePoster" aria-hidden="true"></div>

<div id="hud">
  <div class="chip panel">
    <span id="zone">Rocket Shoes</span>
    <span id="roomNo">round 0</span>
    <span id="hp">♥♥♥♥♥♥</span>
    <span id="pulseWrap"><span id="pulseFill"></span></span>
  </div>
  <div class="chip panel">
    <span id="score">0</span>
    <span id="comboChip">x1.0</span>
    <button class="miniBtn" id="sfxBtn" type="button">sfx on</button>
    <button class="miniBtn" id="bgmBtn" type="button">bgm on</button>
  </div>
</div>
<div id="buildChips"></div>
<!-- build badge: filled from the loaded JS (config.VERSION), so the number on screen
     proves which build this device is actually running — the quickest way to spot a
     stale/cached deploy (phone vs desktop should read the same). -->
<div id="verTag" aria-hidden="true" style="position:fixed;right:6px;bottom:5px;z-index:6;font:600 10px/1 ui-monospace,Menlo,monospace;color:#9fb3d9;opacity:.45;pointer-events:none;letter-spacing:.04em;text-shadow:0 1px 2px #000">—</div>
<div id="whisper"></div>
<div id="rotateHint">⟳ Rotate to landscape for a bigger view</div>

<div id="overlay" class="modalHost"><div class="modal panel">
  <h1 id="overlayTitle"></h1><p id="overlayCopy"></p>
  <div id="overlayBody"></div>
  <div class="buttonRow" id="overlayButtons"></div>
  <div class="meta" id="overlayMeta"></div>
</div></div>

<div id="draft" class="modalHost"><div class="modal panel">
  <h2 id="draftTitle">Pick what changes.</h2>
  <div id="draftCards"></div>
  <div class="meta" id="draftMeta"></div>
</div></div>

<div id="pause" class="modalHost"><div class="modal panel">
  <h2>Paused</h2>
  <div class="buttonRow">
    <button class="bigBtn" id="resumeBtn" type="button">Resume</button>
    <button class="bigBtn" id="pauseSfxBtn" type="button">sfx on</button>
  </div>
</div></div>

<script type="module">
import { boot } from './src/main.js';
boot();
</script>
</body>
</html>
